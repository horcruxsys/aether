[package]
name = "shield"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
aho-corasick = "1.1.4"
getrandom = { version = "0.4.2", features = ["wasm_js"] }
rand = "0.10.1"
regex = "1.12.3"
serde = "1.0.228"
serde-wasm-bindgen = "0.6.5"
serde_json = "1.0.149"
uuid = { version = "1.23.0", features = ["js", "v4"] }
wasm-bindgen = "0.2.118"
