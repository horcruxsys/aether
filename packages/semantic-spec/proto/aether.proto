syntax = "proto3";

package aether;

message MigrationRequest {
  string source = 1;
  string destination = 2;
  map<string, string> options = 3;
}

message MigrationResponse {
  string job_id = 1;
  string status = 2;
  string message = 3;
}

service RefineryService {
  rpc StartMigration(MigrationRequest) returns (MigrationResponse) {}
}
