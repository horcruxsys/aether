apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-refinery-core
  labels:
    app: aether-refinery
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: aether-refinery
  template:
    metadata:
      labels:
        app: aether-refinery
    spec:
      containers:
        - name: refinery-core
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: grpc
              containerPort: 50051
              protocol: TCP
          resources:
            limits:
              cpu: "8"
              memory: "16Gi"
            requests:
              cpu: "2"
              memory: "4Gi"
          env:
            - name: RUST_LOG
              value: "info"
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ .Release.Name }}-refinery-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ .Release.Name }}-refinery-core
  minReplicas: 2
  maxReplicas: 100
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75
