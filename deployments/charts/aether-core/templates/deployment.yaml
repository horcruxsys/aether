apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "aether-core.fullname" . }}
  labels:
    app.kubernetes.io/name: refinery-core
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: refinery-core
  template:
    metadata:
      labels:
        app.kubernetes.io/name: refinery-core
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: grpc
              containerPort: 50051
              protocol: TCP
          livenessProbe:
            exec:
              command:
                - /bin/grpc_health_probe
                - -addr=localhost:50051
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - /bin/grpc_health_probe
                - -addr=localhost:50051
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
